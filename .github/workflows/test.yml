name: test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Build
        run: make build
      - name: Test
        run: make test
      - name: Vet
        run: make lint
