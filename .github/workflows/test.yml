name: test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
      - name: Check formatting
        if: runner.os == 'Linux'
        run: test -z "$(gofmt -l .)"
      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: go build -o dist/monarch ./cmd/monarch
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: go build -o dist/monarch.exe ./cmd/monarch
      - name: Test
        run: go test -v ./...
      - name: Vet
        run: go vet ./...
