# .goreleaser.yaml
version: 2
project_name: monarch

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    main: ./cmd/monarch
    binary: monarch
    ldflags:
      - -s -w
      - -X github.com/thedavidweng/monarchmoney-cli/internal/version.Version={{.Version}}
      - -X github.com/thedavidweng/monarchmoney-cli/internal/version.Commit={{.Commit}}
      - -X github.com/thedavidweng/monarchmoney-cli/internal/version.Date={{.Date}}
      - -X github.com/thedavidweng/monarchmoney-cli/internal/version.BuiltBy=goreleaser

universal_binaries:
  - replace: true

archives:
  - formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64"}}x86_64
      {{- else if eq .Arch "all"}}universal
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

signs:
  - cmd: cosign
    artifacts: checksum
    args:
      - sign-blob
      - '--bundle=${signature}'
      - '${artifact}'
      - '--yes'

sboms:
  - cmd: syft
    artifacts: archive
    args:
      - "${artifact}"
      - --output
      - spdx-json=${document}
    documents:
      - "${artifact}.spdx.json"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  disable: true

release:
  github:
    owner: thedavidweng
    name: monarchmoney-cli
  mode: append
  draft: false
  prerelease: auto

nfpms:
  - package_name: monarch
    vendor: thedavidweng
    maintainer: thedavidweng <noreply@github.com>
    homepage: https://github.com/thedavidweng/monarchmoney-cli
    description: "Local, agent-friendly CLI for Monarch Money"
    license: Apache-2.0
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin

homebrew_casks:
  - name: monarchmoney-cli
    binaries:
      - monarch
    repository:
      owner: thedavidweng
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/thedavidweng/monarchmoney-cli"
    description: "Local, agent-friendly CLI for Monarch Money"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/monarch"]
          end