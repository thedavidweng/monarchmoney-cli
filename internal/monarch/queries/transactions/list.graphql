query GetTransactions($limit: Int!, $offset: Int!, $search: String, $startDate: Date, $endDate: Date) {
  allTransactions(limit: $limit, offset: $offset, search: $search, startDate: $startDate, endDate: $endDate) {
    results {
      id
      date
      amount
      merchant {
        name
      }
      category {
        name
      }
      notes
    }
    totalCount
  }
}
