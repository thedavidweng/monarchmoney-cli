mutation Web_TransactionDrawerUpdateTransaction($input: UpdateTransactionMutationInput!) {
  updateTransaction(input: $input) {
    transaction {
      id
      amount
      pending
      date
      hideFromReports
      needsReview
      reviewedAt
      plaidName
      notes
      isRecurring
      category {
        id
      }
      merchant {
        id
        name
      }
    }
    errors {
      message
    }
  }
}
