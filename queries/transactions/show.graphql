query GetTransaction($id: UUID!) {
  getTransaction(id: $id) {
    id
    amount
    pending
    date
    hideFromReports
    plaidName
    notes
    isRecurring
    reviewStatus
    needsReview
    isSplitTransaction
    createdAt
    updatedAt
    category {
      id
      name
    }
    merchant {
      id
      name
    }
    account {
      id
      displayName
    }
    tags {
      id
      name
      color
      order
    }
  }
}
