query GetInstitutionSettings {
  credentials {
    id
    updateRequired
    disconnectedFromDataProviderAt
    dataProvider
    institution {
      id
      plaidInstitutionId
      name
      status
    }
  }
  accounts(filters: {includeDeleted: true}) {
    id
    displayName
    subtype {
      display
    }
    mask
    credential {
      id
    }
    deletedAt
  }
}
